name: twain_doctor
description: "Twain AI doctor app — patient intake review, recording, brain chat, prescriptions."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  twain_core:
    path: ../../packages/twain_core
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  web_socket_channel: ^3.0.1
  signature: ^5.5.0
  record: ^5.2.0
  path_provider: ^2.1.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
